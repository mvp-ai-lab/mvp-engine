dev_mode: false
engine: Engine
git_info: ""
project:
  name: "mvp-engine"
  dir: "./outputs"
  run_id: ""
  output_dir: ""
  seed: 42
  deterministic: false
  log:
    interval: 20
    backends: ["terminal", "file"]
    timer_window_size: 100
parallel:
  mesh:
    replicate: 1
    shard: 8
    tensor: 1
  backend_kwargs:
optim:
  lr: 0.001
  weight_decay: 0.05
  gradient_accumulation_steps: 1
  mixed_precision: "bf16"
  warmup_ratio: 0.1
  clip_grad_norm: 5
loop:
  policy: "iter"
  total_steps: 10000
  checkpoint:
    keep_n: 5
    interval: 5000
