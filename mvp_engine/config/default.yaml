dev_mode: false
engine: Engine
git_info: ""
project:
  name: "mvp-engine"
  dir: "./outputs"
  run_id: ""
  output_dir: ""
  seed: 42
  deterministic: false
  log:
    interval: 20
    backends: ["terminal", "file"]
parallel:
  type: "ddp"
data:
  dataset_type: ""
  dataset_url: ""
  batch_size: 0
  num_workers: 0
model:
  name: "Model"
optim:
  lr: 0.001
  weight_decay: 0.05
  gradient_accumulation_steps: 1
  mixed_precision: "bf16"
  warmup_ratio: 0.1
  clip_grad_norm: 5
  compile: False
loop:
  policy: "iter"
  total_steps: 10000
  checkpoint:
    keep_n: 5
    interval: 5000