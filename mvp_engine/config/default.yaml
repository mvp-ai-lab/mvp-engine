dev_mode: false
engine: Engine
seed: 42
deterministic: false
init_from_checkpoint: null

project:
  name: "mvp-engine"
  dir: "./outputs"

runtime:
  git_info: ""
  run_id: ""
  output_dir: ""
  world_size: 1
  hostname: ""
  python_version: ""
  torch_version: ""

log:
  interval: 20
  backends: ["terminal", "file"]
  timer_window_size: 100

parallel:
  mesh:
    replicate: 1
    shard: 8
    tensor: 1
  backend_kwargs: {}

optim:
  lr: 0.001
  weight_decay: 0.05
  gradient_accumulation_steps: 1
  mixed_precision: "bf16"
  warmup_ratio: 0.1
  clip_grad_norm: 5

loop:
  policy: "iter"
  total_steps: 10000

checkpoint:
  keep_n: 5
  interval: 5000
  hf_enable: false

auto_research:
  enabled: false
  endpoint: "http://127.0.0.1:8787"
  cwd: null
  session_id: null
  transport: "codex_mvp_exec"
  strict: false
  auto_bind: true
  progress_interval: 1
  flush_timeout_seconds: 60.0
  metadata: {}
  lmms_eval: {}
