dev_mode: false
engine: InterleavedEngine

seed: 42
deterministic: false

project:
  name: "interleaved"
  dir: "./outputs"

log:
  interval: 1
  backends: ["terminal", "file", "wandb"]
  accumulation_size: 1
  timer_window_size: 10

parallel:
  mesh:
    replicate: -1
    shard: 8
    tensor: 1

data:
  train_path: "./data/interleaved/wiki_merge_missing0420_stage2_64k/meta.json"
  ref_columns: ["images"]
  thinking_mode: "non-empty"
  packing_selection_strategy: "best_fit"
  packing_open_pack_limit: 8
  packing_buffer_size: 64
  max_seq_len: 65536
  batch_size: 1
  num_workers: 4

model:
  pretrained_model_name_or_path: "/cache/save_dir/bee_stage1_packing_v4_14msp_260202/output/final"
  attn_implementation: "flash_attention_2"
  image_min_pixels: 1024
  image_max_pixels: 12845056
  gradient_checkpointing:
    enabled: true
    use_reentrant: false
  freeze_vit: false
  freeze_projector: false
  freeze_llm: false
  compile:
    enabled: false
    backend: "inductor"
    mode: "default"

optim:
  lr: 6.0e-5
  weight_decay: 0.0
  gradient_accumulation_steps: 1
  mixed_precision: "bf16"
  warmup_ratio: 0.002
  clip_grad_norm: 1.0

loop:
  policy: "iter"
  total_steps: 4667

checkpoint:
  interval: 200
  keep_n: 2
  hf_enable: true
