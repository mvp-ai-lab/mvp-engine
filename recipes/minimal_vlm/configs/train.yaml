dev_mode: false
engine: MinimalVlmEngine
project:
  name: "minimal-vlm"
  dir: "./outputs"
  seed: 42
  deterministic: false
  log:
    interval: 20
    backends: ["terminal", "file"]
parallel:
  mesh:
    replicate: -1
    shard: 1
    tensor: 1
  backend_kwargs:
data:
  train_path: "./data/minimal_vlm/demo.jsonl"
  eval_path: null
  max_seq_len: 2048
  batch_size: 1
  num_workers: 0
model:
  pretrained_model_name_or_path: "Qwen/Qwen3-VL-2B-Instruct"
  trust_remote_code: true
  freeze_visual: true
optim:
  lr: 1.0e-5
  weight_decay: 0.05
  gradient_accumulation_steps: 1
  mixed_precision: "bf16"
  warmup_ratio: 0.1
  clip_grad_norm: 1.0
loop:
  policy: "iter"
  total_steps: 100
  checkpoint:
    keep_n: 3
    interval: 50
