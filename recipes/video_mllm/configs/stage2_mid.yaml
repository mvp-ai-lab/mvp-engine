dev_mode: false
engine: VideoMLLMEngine

# Stage 2 — MIXED MID-TRAINING. Encoder frozen; train projector + LLM on a per-row mix of
# OV2 30s video-caption rows + OpenBee image-text rows (modality=mixed; ~6:4 video:image).
# Starts from the Stage-1 aligned checkpoint. OV2 videos online-decode from video_root;
# OpenBee images are inline. Build the lance with scripts/data/build_stage2_mixed_lance.py.

seed: 42
deterministic: false

project:
  name: "video-mllm-stage2-mid"
  dir: "./outputs"

parallel:
  mesh:
    replicate: -1
    shard: 1
    tensor: 1

data:
  # Built by scripts/data/build_stage2_mixed_lance.py (image rows inline + video rows as paths).
  train_path: "./data/Stage2-Mixed-Lance/samples.lance"
  source: "lance"
  ref_columns: []            # images inline; OV2 videos referenced by path (online decode)
  modality: "mixed"          # per-row dispatch: images -> 1 frame, videos -> strategy frames
  # Resolves OV2 images_source (relative 30s/...mp4) paths; OpenBee image rows ignore it.
  video_root: "/mnt/data-alpha-sg-01/team-camera/shared/mvp-engine/data/OV2-mid-video/extracted"
  max_seq_len: 8192
  batch_size: 1
  num_workers: 8             # workers OK now (DataLoadMesh dp-rank is cached, worker-safe)
  num_frames: 16             # video rows: 16 frames @ video_frame_size
  video_frame_size: 224      # video frame side (256 tok/frame -> 4096 tok/video)
  image_frame_size: 448      # image row side (1024 tok/image, OneVision-native)
  video_encoding_strategy: "uniform"

model:
  # BASE builds the native architecture + processor; the Stage-1 aligned projector is loaded
  # post-swap via init_weights_from (override the run dir at launch if it differs).
  pretrained_model_name_or_path: "./pretrained/Qwen3-VL-8B-Base-woDS-stage0"
  init_weights_from: "./outputs/vmllm_stage1_align_20260621121819_67ac/checkpoints/iter_4500/hf_model/model.safetensors"
  attn_implementation: "flash_attention_2"
  freeze_vit: true
  freeze_projector: false    # train projector + LLM
  freeze_llm: false
  vision_encoder_name_or_path: "/mnt/data-alpha-sg-01/team-camera/home/c84391361/projects/OVEncoder-align/checkpoints/onevision-encoder-large-lang"
  freeze_vision_encoder: true

optim:
  optimizer: "AdamW"
  lr: 1.0e-5                 # OV2 mid/instruct lr
  weight_decay: 0.05
  gradient_accumulation_steps: 2
  mixed_precision: "bf16"
  warmup_ratio: 0.05
  clip_grad_norm: 1.0

loop:
  policy: "iter"
  total_steps: 7000          # ~1M mixed samples at 2 nodes (launcher overrides per node count)

checkpoint:
  interval: 2000
  keep_n: 3
  hf_enable: true            # Stage 3 (SFT) loads this ckpt

log:
  interval: 10
  backends: ["terminal", "file", "wandb"]
