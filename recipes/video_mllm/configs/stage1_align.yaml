dev_mode: false
engine: VideoMLLMEngine

# Stage 1 — ALIGNMENT (projector warmup). Freeze the OneVision encoder AND the Qwen3-VL LLM;
# train ONLY the connector/projector so the swapped OneVision features align to the LLM's input
# space (this is the step our earlier SFT runs skipped — projector was frozen and never aligned).
# Data: OpenBee Stage-1 image-text alignment data. This aligns the randomly initialized
# projector before OV2-style video mid-training.

seed: 42
deterministic: false

project:
  name: "video-mllm-stage1-align"
  dir: "./outputs"

parallel:
  mesh:
    replicate: -1
    shard: 1
    tensor: 1

data:
  # Built by scripts/data/build_openbee_stage1_lance.py (inline images + computed img_size).
  train_path: "./data/Open-Bee-Lance/stage1/samples.lance"
  source: "lance"
  ref_columns: []            # images are inline in samples.lance; kit ref-resolution is skipped
  modality: "image"          # encode each image as one OneVision frame (image-text alignment)
  video_root: null
  max_seq_len: 8192
  batch_size: 1
  num_workers: 0             # REQUIRED: lance DP-shard reads the device_mesh PG, unavailable in DataLoader workers
  # Square side fed to the (frozen) OneVision encoder; must be divisible by patch size.
  # 448 = encoder-native res -> 1024 visual tokens for a single image (fits max_seq_len cheaply).
  # Video stages keep 224 because 16 frames x 448 would overflow the sequence budget.
  video_frame_size: 448

model:
  pretrained_model_name_or_path: "./pretrained/Qwen3-VL-8B-Base-woDS-stage0"
  attn_implementation: "flash_attention_2"
  freeze_vit: true
  freeze_projector: false   # <-- the only trainable part in alignment
  freeze_llm: true
  vision_encoder_name_or_path: "/mnt/data-alpha-sg-01/team-camera/home/c84391361/projects/OVEncoder-align/checkpoints/onevision-encoder-large-lang"
  freeze_vision_encoder: true

optim:
  optimizer: "AdamW"
  lr: 1.0e-3            # projector warmup uses a higher lr than SFT (classic LLaVA alignment ~1e-3)
  weight_decay: 0.0
  gradient_accumulation_steps: 2
  mixed_precision: "bf16"
  warmup_ratio: 0.03
  clip_grad_norm: 1.0

loop:
  policy: "iter"
  total_steps: 4000

checkpoint:
  interval: 2000
  keep_n: 1
  hf_enable: true        # save safetensors so Stage 2 can load this aligned ckpt

log:
  interval: 10
  backends: ["terminal", "file", "wandb"]
