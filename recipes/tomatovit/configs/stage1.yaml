dev_mode: false
engine: TomatoViTEngine
project:
  name: "tomatovit"
data:
  dataset_type: "webdataset"
  data_path: "./data/potato_v1/data"
  label_path: "./data/potato_v1/labels"
  resize: [224, 224]
  image_mean: [0.48145466, 0.4578275, 0.40821073]
  image_std: [0.26862954, 0.26130258, 0.27577711]
  batch_size: 128
  num_workers: 2
  shuffle_buffer: 5000
model:
  name: "TomatoViT"
  pretrained: ./pretrained/tomato_vit_l
  partial_fc:
    num_classes: 100000
    sample_rate: 0.1
    margin: 0.3
    label_select: 0
    random_diff: 10
    rgb_lam: 1.0
    depth_lam: 1.0
  freeze_rgb_backbone: true
  freeze_depth_backbone: true
  freeze_rgb_pooling: false
  freeze_depth_pooling: false
  freeze_rgb_head: false
  freeze_depth_head: false
  ibot:
    teacher_temp: 0.04
    warmup_teacher_temp: 0.04
    warmup_teacher_temp_steps: 1000
    student_temp: 0.1
    center_momentum: 0.9
    lam: 0
    mim_start_step: 0
    mask_ratio: 0
optim:
  lr: 0.00001
  weight_decay: 0.05
  gradient_accumulation_steps: 1
  mixed_precision: "bf16"
  warmup_ratio: 0.1
  clip_grad_norm: 5
  compile: True
  compile_backend: "inductor"
  compile_mode: "max-autotune"
loop:
  policy: "iter"
  total_steps: 100000
  checkpoint:
    keep_n: 5
    interval: 5000