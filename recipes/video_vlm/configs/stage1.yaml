dev_mode: false
engine: VideoVLMEngine

seed: 42
deterministic: false

project:
  name: "video_vlm-qwen3vl_8b-alignment"
  dir: "./outputs"

log:
  interval: 1
  backends: ["terminal", "file", "wandb"]
  accumulation_size: 1
  timer_window_size: 10

parallel:
  mesh:
    replicate: -1
    shard: 1
    tensor: 1
data:
  train_path: "./data/Open-Bee-Lance/stage1/meta.json"
  ref_columns: ["images"]
  thinking_mode: "non-empty"
  packing: true
  packing_selection_strategy: "best_fit"
  packing_open_pack_limit: 8
  packing_buffer_size: 64
  max_seq_len: 8192
  batch_size: 1
  num_workers: 12
  video_placeholder: "<video>"
  codec_enabled: true
  codec_num_frames: 64
  codec_packed_frames: 8
  codec_frame_size: 224
  codec_patch_size: 14
  codec_k_keep: 2048
  hevc_decoder_bin: null
  cv_reader_required: true
model:
  pretrained_model_name_or_path: "./pretrained/Qwen3-VL-8B-Base-woDS-stage0"
  vision_encoder_name_or_path: "lmms-lab-encoder/onevision-encoder-large"
  attn_implementation: "flash_attention_2"
  image_max_pixels: 1048576
  gradient_checkpointing:
    enabled: false
    use_reentrant: false
  freeze_vit: true
  freeze_vision_encoder: true
  freeze_merger: false
  freeze_llm: true
  compile: true
  compile_backend: "inductor"
  compile_mode: "default"
optim:
  lr: 1.0e-4
  weight_decay: 0.0
  gradient_accumulation_steps: 4
  mixed_precision: "bf16"
  warmup_ratio: 0.0
  clip_grad_norm: 1.0

loop:
  policy: "iter"
  total_steps: -1

checkpoint:
  interval: 100
  keep_n: 2
  hf_enable: true
