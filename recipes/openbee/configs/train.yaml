dev_mode: false
engine: OpenbeeEngine

seed: 42
deterministic: false

project:
  name: "openbee-alignment"
  dir: "./outputs"

parallel:
  mesh:
    replicate: -1
    shard: 8
    tensor: 1
  backend_kwargs:
    fsdp2:
      reshard_after_forward: false
data:
  train_path: "./data/openbee/stage1-stage2-mm-only/dev.jsonl"
  cache: false
  cache_show_progress: true
  shuffle_buffer: 1000
  packing: true
  packing_selection_strategy: "best_fit"
  packing_open_pack_limit: 8
  packing_buffer_size: 64
  max_seq_len: 4096
  batch_size: 2
model:
  pretrained_model_name_or_path: "./recipes/openbee/pretrained/Qwen3-VL-8B-Instruct"
  # Freeze flags — set true to stop gradient for the corresponding sub-module.
  # Defaults follow the alignment-stage convention: train merger only.
  freeze_vit: true
  freeze_merger: false
  freeze_llm: true
  compile: true
  compile_backend: "inductor"
  compile_mode: "default"
optim:
  lr: 1.0e-5
  weight_decay: 0.05
  gradient_accumulation_steps: 16
  mixed_precision: "bf16"
  warmup_ratio: 0.05
  clip_grad_norm: 1.0

loop:
  policy: "iter"
  total_steps: 10000
