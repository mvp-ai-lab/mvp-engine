dev_mode: false
engine: OpenbeeEngine

seed: 42
deterministic: false

project:
  name: "openbee-alignment"
  dir: "./outputs"

parallel:
  mesh:
    replicate: -1
    shard: 1
    tensor: 1
data:
  train_path: "./data/openbee/stage1-stage2-mm-only/dev.jsonl"
  max_seq_len: 2048
  batch_size: 1
model:
  pretrained_model_name_or_path: "./recipes/openbee/pretrained/Qwen3-VL-8B-Instruct"
  # Freeze flags — set true to stop gradient for the corresponding sub-module.
  # Defaults follow the alignment-stage convention: train merger only.
  freeze_vit: true
  freeze_merger: false
  freeze_llm: true
optim:
  lr: 1.0e-5
  weight_decay: 0.05
loop:
  policy: "iter"
  total_steps: 100
