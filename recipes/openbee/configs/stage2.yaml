dev_mode: false
engine: OpenbeeEngine

seed: 42
deterministic: false

project:
  name: "openbee-qwen3vl_8b-pretrain"
  dir: "./outputs"

log:
  interval: 1

parallel:
  mesh:
    replicate: 1
    shard: -1
    tensor: 1
data:
  train_path: "./data/openbee/stage2/**/*.parquet"
  enable_thinking: false
  cache: false
  shuffle_buffer: 1000
  packing: true
  packing_selection_strategy: "best_fit"
  packing_open_pack_limit: 8
  packing_buffer_size: 64
  max_seq_len: 4096
  batch_size: 1
  num_workers: 12
model:
  pretrained_model_name_or_path: "./pretrained/Qwen3-VL-8B-Base-woDS-stage1"
  attn_implementation: "flash_attention_2"
  image_max_pixels: 1048576
  # Freeze flags — set true to stop gradient for the corresponding sub-module.
  # Defaults follow the alignment-stage convention: train merger only.
  freeze_vit: false
  freeze_merger: false
  freeze_llm: false
  compile: true
  compile_backend: "inductor"
  compile_mode: "default"
optim:
  lr: 6.0e-5
  weight_decay: 0.0
  gradient_accumulation_steps: 2
  mixed_precision: "bf16"
  warmup_ratio: 0.0
  clip_grad_norm: 1.0

loop:
  policy: "iter"
  total_steps: 12000

checkpoint:
  interval: 200
  keep_n: 2
  hf_enable: true
