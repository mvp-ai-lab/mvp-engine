defaults:
  - stage1

# FSDP2 template for 2 GPUs.
# Adjust mesh sizes so dp_size * fsdp2_size * tp_size == WORLD_SIZE.
parallel:
  mesh:
    dp_size: 1
    fsdp2_size: 2
    tp_size: 1
  backend_kwargs:
    reshard_after_forward: true
    mp_policy:
      param_dtype: bfloat16
      reduce_dtype: float32
      output_dtype: bfloat16
    high_precision_modules: ["LayerNorm"]
