dev_mode: false
engine: Qwen3VLEngine

seed: 42
deterministic: false

project:
  name: "qwen3_vl"
  dir: "./outputs"

log:
  interval: 1
  backends: ["terminal", "file", "wandb"]
  accumulation_size: 1
  timer_window_size: 10

parallel:
  mesh:
    replicate: -1
    shard: 4
    context: 2
    tensor: 1
  backend_kwargs:
    tp:
      builtin_sequence_parallel: false
    cp:
      implementation: "ulysses"
      attn_implementation: "flash_attention_2"
      grad_sync: true
      grad_reduce_dtype: float32

data:
  train_path: "./data/mvp-engine-vlm-dev-data/meta.json"
  ref_columns: ["images"]
  thinking_mode: "non-empty"
  packing_selection_strategy: "best_fit"
  packing_open_pack_limit: 8
  packing_buffer_size: 64
  max_seq_len: 8192
  batch_size: 1
  num_workers: 4

model:
  pretrained_model_name_or_path: "Qwen/Qwen3-VL-8B-Instruct"
  attn_implementation: "flash_attention_2"
  image_max_pixels: 1048576
  gradient_checkpointing:
    enabled: true
    use_reentrant: false
  freeze_vit: false
  freeze_projector: false
  freeze_llm: false
  compile:
    enabled: false
    backend: "inductor"
    mode: "default"

optim:
  optimizer: "AdamW"
  lr: 1.0e-5
  weight_decay: 0.05
  global_batch_size: 256
  gradient_accumulation_steps: -1
  mixed_precision: "bf16"
  warmup_ratio: 0.03
  clip_grad_norm: 1.0
  loss_spike_skip_multiplier: null
  loss_spike_skip_window_size: 8
  loss_spike_skip_min_history: 3

loop:
  policy: "iter"
  total_steps: -1

checkpoint:
  interval: 100
  keep_n: 2
  hf_enable: true
